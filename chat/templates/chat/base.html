<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E2EE Chat{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: hsl(230, 25%, 7%);
            --surface: hsl(230, 25%, 11%);
            --surface2: hsl(230, 20%, 16%);
            --border: hsl(230, 20%, 18%);
            --text: hsl(210, 40%, 96%);
            --text-muted: hsl(220, 15%, 55%);
            --primary: hsl(160, 84%, 50%);
            --primary-dim: hsl(160, 84%, 30%);
            --accent: hsl(270, 80%, 65%);
            --sent: hsl(160, 84%, 50%);
            --received: hsl(230, 20%, 16%);
            --danger: hsl(0, 72%, 55%);
            --radius: 12px;
            --glass: rgba(20, 22, 35, 0.7);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        nav .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        nav a:hover {
            color: var(--text);
        }

        nav a.active {
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 1rem auto;
            width: 100%;
            padding: 0 1rem;
            flex: 1;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        button, .btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover, .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 255, 170, 0.3);
        }

        button.secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        button.danger {
            background: var(--danger);
            color: white;
        }

        input {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            width: 100%;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .chat-box {
            height: 500px;
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .message {
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            position: relative;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--primary);
            color: var(--bg);
            border-bottom-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        .msg-meta {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .msg-actions {
            display: flex;
            gap: 0.8rem;
        }

        .action-icon {
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .action-icon:hover { opacity: 1; }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--surface2);
            border-radius: var(--radius);
            margin-bottom: 0.8rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .user-item:hover {
            border-color: var(--primary);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            nav {
                padding: 1rem;
            }
            nav .logo span {
                display: none;
            }
            .nav-links span {
                display: none;
            }
            .container {
                margin: 0.5rem auto;
            }
            .card {
                padding: 1rem;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            .chat-box {
                height: 60vh;
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'chat:landing' %}" class="logo">
            <span style="color: var(--primary)">◈</span> E2EE CHAT
        </a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'chat:user_list' %}">Explore</a>
                <span style="color: var(--text-muted)">|</span>
                <span style="color: var(--text)">{{ user.username }}</span>
                <a href="{% url 'chat:logout' %}" style="color: var(--danger)">Logout</a>
            {% else %}
                <a href="{% url 'chat:login' %}">Login</a>
                <a href="{% url 'chat:register' %}" class="btn">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        const ALGO = {
            name: "RSA-OAEP",
            modulusLength: 2048,
            publicExponent: new Uint8Array([1, 0, 1]),
            hash: "SHA-256"
        };

        const USERNAME = "{{ user.username }}";
        const KEY_PREFIX = `chat_keys_${USERNAME}_`;

        // Helper to store in localStorage
        function storeLocal(name, value) {
            localStorage.setItem(KEY_PREFIX + name, value);
        }

        function getLocal(name) {
            return localStorage.getItem(KEY_PREFIX + name);
        }

        async function deriveMasterKey(passphrase, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw", encoder.encode(passphrase), "PBKDF2", false, ["deriveKey"]
            );
            return await crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: encoder.encode(salt),
                    iterations: 100000,
                    hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptPrivateKey(privateKey, masterKey) {
            const exported = await crypto.subtle.exportKey("pkcs8", privateKey);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                masterKey,
                exported
            );
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv);
            combined.set(new Uint8Array(encrypted), iv.length);
            return btoa(String.fromCharCode(...combined));
        }

        async function decryptPrivateKey(encryptedBase64, masterKey) {
            try {
                const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
                const iv = combined.slice(0, 12);
                const data = combined.slice(12);
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    masterKey,
                    data
                );
                return await crypto.subtle.importKey("pkcs8", decrypted, ALGO, true, ["decrypt"]);
            } catch (e) {
                console.error("Decryption failed", e);
                return null;
            }
        }

        async function exportPublicKey(key) {
            const exported = await crypto.subtle.exportKey("spki", key);
            return btoa(String.fromCharCode(...new Uint8Array(exported)));
        }

        async function importPublicKey(spkiBase64) {
            const binaryDer = Uint8Array.from(atob(spkiBase64), c => c.charCodeAt(0));
            return await crypto.subtle.importKey("spki", binaryDer, ALGO, true, ["encrypt"]);
        }

        // Global variables to hold active keys
        let MY_PUBLIC_KEY = null;
        let MY_PRIVATE_KEY = null;

        async function ensureKeys() {
            if (!{{ user.is_authenticated|yesno:"true,false" }}) return;

            const localPub = getLocal("publicKey");
            const localPriv = getLocal("privateKey");

            if (localPub && localPriv) {
                MY_PUBLIC_KEY = await importPublicKey(localPub);
                const privDer = Uint8Array.from(atob(localPriv), c => c.charCodeAt(0));
                MY_PRIVATE_KEY = await crypto.subtle.importKey("pkcs8", privDer, ALGO, true, ["decrypt"]);
                
                // Still ping server to make sure it has our public key (Render SQLite fix)
                await fetch("{% url 'chat:save_public_key' %}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
                    body: JSON.stringify({ public_key: localPub })
                });
                return;
            }

            // Try to fetch from server
            const response = await fetch("{% url 'chat:get_my_keys' %}");
            if (response.ok) {
                const data = await response.json();
                if (data.encrypted_private_key && data.salt) {
                    const passphrase = prompt("Keys found on server. Enter your Chat Passphrase to unlock:");
                    if (!passphrase) return;

                    const masterKey = await deriveMasterKey(passphrase, data.salt);
                    const privKey = await decryptPrivateKey(data.encrypted_private_key, masterKey);
                    
                    if (privKey) {
                        MY_PRIVATE_KEY = privKey;
                        MY_PUBLIC_KEY = await importPublicKey(data.public_key);
                        
                        const privExported = await crypto.subtle.exportKey("pkcs8", privKey);
                        storeLocal("privateKey", btoa(String.fromCharCode(...new Uint8Array(privExported))));
                        storeLocal("publicKey", data.public_key);
                        alert("Keys recovered successfully!");
                        location.reload();
                        return;
                    } else {
                        alert("Incorrect passphrase. Please try again.");
                        return ensureKeys();
                    }
                }
            }

            // No keys anywhere, generate new ones
            if (confirm("No encryption keys found. Generate new ones? This will require a passphrase.")) {
                const passphrase = prompt("Set a new Chat Passphrase (DO NOT LOSE THIS):");
                if (!passphrase) return;

                console.log("Generating keys...");
                const keyPair = await crypto.subtle.generateKey(ALGO, true, ["encrypt", "decrypt"]);
                const salt = btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(16))));
                const masterKey = await deriveMasterKey(passphrase, salt);
                
                const encryptedPriv = await encryptPrivateKey(keyPair.privateKey, masterKey);
                const pubBase64 = await exportPublicKey(keyPair.publicKey);

                await fetch("{% url 'chat:save_public_key' %}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
                    body: JSON.stringify({
                        public_key: pubBase64,
                        encrypted_private_key: encryptedPriv,
                        salt: salt
                    })
                });

                const privExported = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
                storeLocal("privateKey", btoa(String.fromCharCode(...new Uint8Array(privExported))));
                storeLocal("publicKey", pubBase64);
                
                MY_PUBLIC_KEY = keyPair.publicKey;
                MY_PRIVATE_KEY = keyPair.privateKey;
                alert("New keys generated and backed up to server.");
            }
        }

        async function encryptMessage(text, recipientPublicKeyStr) {
            const recipientPublicKey = await importPublicKey(recipientPublicKeyStr);
            const encoded = new TextEncoder().encode(text);
            const encrypted = await crypto.subtle.encrypt(ALGO, recipientPublicKey, encoded);
            return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
        }

        async function decryptMessage(encryptedBase64) {
            if (!MY_PRIVATE_KEY) return "[Key Locked]";
            try {
                const encrypted = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
                const decrypted = await crypto.subtle.decrypt(ALGO, MY_PRIVATE_KEY, encrypted);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[Decryption failed]";
            }
        }

        document.addEventListener("DOMContentLoaded", ensureKeys);
    </script>
</body>
</html>
