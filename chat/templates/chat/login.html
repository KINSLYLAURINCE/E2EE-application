{% extends 'chat/base.html' %}
{% block title %}Access Point | E2EE Chat{% endblock %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 4rem auto; border-top: 4px solid var(--primary);">
    <h2 style="text-align: center; margin-bottom: 2rem; letter-spacing: 0.1em;">AUTHENTICATE</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit" style="width: 100%; margin-top: 1rem; padding: 1rem;">INITIALIZE SESSION</button>
    </form>
    <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
        New node? <a href="{% url 'chat:register' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Request Credentials</a>
    </div>
</div>
{% endblock %}
