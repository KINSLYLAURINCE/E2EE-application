services:
  - type: web
    name: encryption-chat
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn EncryptionProject.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: encryption-chat-db
          property: connectionString

databases:
  - name: encryption-chat-db
    databaseName: encryption_chat
    user: encryption_user